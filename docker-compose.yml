services:
  db-inventory:
    image: postgres:15
    container_name: db-inventory
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventarysoft_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - db_inventory_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-inventory
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inventarysoft.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db-inventory

volumes:
  db_inventory_data:
